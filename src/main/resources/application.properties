spring.application.name=marketplace
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/marketplace}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:marketplace}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}

spring.h2.console.enabled=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.catalog-seeder.enabled=${CATALOG_SEEDER_ENABLED:false}
app.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

app.migration.h2-to-postgres.enabled=${MIGRATE_H2_TO_POSTGRES:false}
app.migration.h2-to-postgres.source-url=${H2_SOURCE_URL:jdbc:h2:file:./data/marketplace}
app.migration.h2-to-postgres.source-username=${H2_SOURCE_USERNAME:sa}
app.migration.h2-to-postgres.source-password=${H2_SOURCE_PASSWORD:}
